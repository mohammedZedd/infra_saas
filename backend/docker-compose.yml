services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudforge_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cloudforge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudforge_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cloudforge_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cloudforge.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-cloudforge_admin_password}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloudforge_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudforge_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://cloudforge:cloudforge_dev_password@postgres:5432/cloudforge}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BACKEND_INTERNAL_PORT: ${BACKEND_INTERNAL_PORT:-8000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-cloudforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudforge_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cloudforge}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bash", "-c", "./scripts/start.sh"]
    networks:
      - cloudforge_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  cloudforge_network:
    driver: bridge
